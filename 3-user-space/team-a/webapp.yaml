apiVersion: shoulders.io/v1alpha1
kind: WebApplication
metadata:
  name: team-a-instance
  namespace: team-a
spec:
  image: nginx
  tag: latest
  replicas: 2
  host: my-app.example.com
  port: 8080
  env:
    - name: LOG_LEVEL
      value: info
  envFrom:
    - secretRef:
        name: team-a-app-config
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  securityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
  volumes:
    - name: tmp
      emptyDir: {}
  volumeMounts:
    - name: tmp
      mountPath: /tmp