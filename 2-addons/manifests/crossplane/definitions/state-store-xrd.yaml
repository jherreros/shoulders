apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: statestores.shoulders.io
spec:
  group: shoulders.io
  names:
    kind: StateStore
    plural: statestores
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                postgresql:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    storage:
                      type: string
                      default: 1Gi
                    databases:
                      type: array
                      items:
                        type: string
                redis:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    replicas:
                      type: integer
                      default: 1
                objectStorage:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    endpoint:
                      type: string
                      default: http://garage.garage.svc.cluster.local:3900
                    region:
                      type: string
                      default: garage
                    buckets:
                      type: array
                      items:
                        type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                          secretName:
                            type: string
                          read:
                            type: boolean
                            default: true
                          write:
                            type: boolean
                            default: true
                          owner:
                            type: boolean
                            default: false
