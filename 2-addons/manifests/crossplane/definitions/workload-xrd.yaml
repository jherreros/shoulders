apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: workloads.shoulders.io
spec:
  group: shoulders.io
  names:
    kind: Workload
    plural: workloads
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                type:
                  type: string
                  default: worker
                  enum:
                    - worker
                    - job
                    - cronjob
                image:
                  type: string
                tag:
                  type: string
                replicas:
                  type: integer
                  default: 1
                  minimum: 0
                schedule:
                  type: string
                restartPolicy:
                  type: string
                  default: OnFailure
                  enum:
                    - Always
                    - OnFailure
                    - Never
                backoffLimit:
                  type: integer
                  default: 6
                  minimum: 0
                concurrencyPolicy:
                  type: string
                  default: Forbid
                  enum:
                    - Allow
                    - Forbid
                    - Replace
                imagePullPolicy:
                  type: string
                  enum:
                    - Always
                    - IfNotPresent
                    - Never
                command:
                  type: array
                  items:
                    type: string
                args:
                  type: array
                  items:
                    type: string
                env:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                envFrom:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                volumeMounts:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                volumes:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                podSecurityContext:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                securityContext:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                serviceAccountName:
                  type: string
              required:
                - image
                - tag