apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: application-composition
  labels:
    crossplane.io/xrd: webapplications.shoulders.io
spec:
  compositeTypeRef:
    apiVersion: shoulders.io/v1alpha1
    kind: WebApplication
  mode: Pipeline
  pipeline:
    - step: go-templating
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource -}}
            {{- $name := $xr.metadata.name -}}
            {{- $namespace := $xr.metadata.namespace -}}
            {{- $spec := $xr.spec -}}
            {{- $containerPort := ($spec.port | default 80) -}}
            {{- $servicePort := 80 -}}
            {{- $replicas := 1 -}}
            {{- $routeEnabled := true -}}
            {{- $gatewayName := "cilium-gateway" -}}
            {{- $gatewayNamespace := "kube-system" -}}
            {{- if hasKey $spec "replicas" -}}
            {{- $replicas = $spec.replicas -}}
            {{- end -}}
            {{- with $spec.service -}}
            {{- with .port -}}
            {{- $servicePort = . -}}
            {{- end -}}
            {{- end -}}
            {{- with $spec.route -}}
            {{- if eq .enabled false -}}
            {{- $routeEnabled = false -}}
            {{- end -}}
            {{- with .gatewayName -}}
            {{- $gatewayName = . -}}
            {{- end -}}
            {{- with .gatewayNamespace -}}
            {{- $gatewayNamespace = . -}}
            {{- end -}}
            {{- end -}}
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: "deployment"
                {{ if eq (int $replicas) 0 }}
                gotemplating.fn.crossplane.io/ready: "True"
                {{ end }}
              name: {{ $name | quote }}
              namespace: {{ $namespace | quote }}
              labels:
                app: {{ $name | quote }}
                shoulders.io/webapplication: {{ $name | quote }}
            spec:
              replicas: {{ $replicas }}
              selector:
                matchLabels:
                  app: {{ $name | quote }}
              template:
                metadata:
                  labels:
                    app: {{ $name | quote }}
                    shoulders.io/webapplication: {{ $name | quote }}
                spec:
                  {{ with $spec.serviceAccountName }}
                  serviceAccountName: {{ . | quote }}
                  {{ end }}
                  {{ with $spec.podSecurityContext }}
                  securityContext:
            {{ toYaml . | nindent 20 }}
                  {{ end }}
                  containers:
                    - name: app
                      image: {{ printf "%s:%s" $spec.image $spec.tag | quote }}
                      {{ with $spec.imagePullPolicy }}
                      imagePullPolicy: {{ . | quote }}
                      {{ end }}
                      {{ with $spec.command }}
                      command:
              {{ toYaml . | nindent 24 }}
                      {{ end }}
                      {{ with $spec.args }}
                      args:
              {{ toYaml . | nindent 24 }}
                      {{ end }}
                      ports:
                        - name: http
                          containerPort: {{ $containerPort }}
                      {{ with $spec.env }}
                      env:
              {{ toYaml . | nindent 24 }}
                      {{ end }}
                      {{ with $spec.envFrom }}
                      envFrom:
              {{ toYaml . | nindent 24 }}
                      {{ end }}
                      {{ with $spec.resources }}
                      resources:
              {{ toYaml . | nindent 24 }}
                      {{ end }}
                      {{ with $spec.securityContext }}
                      securityContext:
              {{ toYaml . | nindent 24 }}
                      {{ end }}
                      {{ with $spec.readinessProbe }}
                      readinessProbe:
              {{ toYaml . | nindent 24 }}
                      {{ end }}
                      {{ with $spec.livenessProbe }}
                      livenessProbe:
              {{ toYaml . | nindent 24 }}
                      {{ end }}
                      {{ with $spec.startupProbe }}
                      startupProbe:
              {{ toYaml . | nindent 24 }}
                      {{ end }}
                      {{ with $spec.volumeMounts }}
                      volumeMounts:
              {{ toYaml . | nindent 24 }}
                      {{ end }}
                  {{ with $spec.volumes }}
                  volumes:
              {{ toYaml . | nindent 20 }}
                  {{ end }}
            ---
            apiVersion: v1
            kind: Service
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: "service"
                gotemplating.fn.crossplane.io/ready: "True"
              name: {{ $name | quote }}
              namespace: {{ $namespace | quote }}
              labels:
                app: {{ $name | quote }}
                shoulders.io/webapplication: {{ $name | quote }}
            spec:
              selector:
                app: {{ $name | quote }}
              ports:
                - name: http
                  port: {{ $servicePort }}
                  targetPort: {{ $containerPort }}
            {{ if and $routeEnabled $spec.host }}
            ---
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: "httproute"
                gotemplating.fn.crossplane.io/ready: "True"
              name: {{ $name | quote }}
              namespace: {{ $namespace | quote }}
              labels:
                app: {{ $name | quote }}
                shoulders.io/webapplication: {{ $name | quote }}
            spec:
              parentRefs:
                - name: {{ $gatewayName | quote }}
                  namespace: {{ $gatewayNamespace | quote }}
              hostnames:
                - {{ $spec.host | quote }}
              rules:
                - backendRefs:
                    - name: {{ $name | quote }}
                      port: {{ $servicePort }}
            ---
            apiVersion: cilium.io/v2
            kind: CiliumNetworkPolicy
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: "gateway-ingress-policy"
                gotemplating.fn.crossplane.io/ready: "True"
              name: {{ printf "%s-gateway-ingress" $name | trunc 63 | trimSuffix "-" | quote }}
              namespace: {{ $namespace | quote }}
              labels:
                app: {{ $name | quote }}
                shoulders.io/webapplication: {{ $name | quote }}
            spec:
              endpointSelector:
                matchLabels:
                  app: {{ $name | quote }}
              ingress:
                - fromEntities:
                    - ingress
                  toPorts:
                    - ports:
                        - port: {{ $containerPort | quote }}
                          protocol: TCP
                - fromEndpoints:
                    - matchLabels:
                        k8s:io.kubernetes.pod.namespace: {{ $gatewayNamespace | quote }}
                  toPorts:
                    - ports:
                        - port: {{ $containerPort | quote }}
                          protocol: TCP
            {{ end }}
    - step: auto-ready
      functionRef:
        name: function-auto-ready